<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:transparent;display:flex;align-items:center;justify-content:center}
  svg{width:90vw;max-width:950px;height:auto}
  .s{fill:none;stroke:#000;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .dot{fill:none;stroke:#000;stroke-width:8;stroke-linecap:round;opacity:0}
  #pen{fill:#000;opacity:0}
</style>
</head>
<body>

<svg viewBox="0 0 762 92" xmlns="http://www.w3.org/2000/svg">

  <!-- e -->
  <path class="s" d="M 143,50 L 163,50 C 165,34 143,30 143,50 C 143,66 157,70 165,62"/>

  <!-- ===== dein ===== word pause -->

  <path class="s" d="M 222,18 L 222,65"/>
  <!-- e -->
  <path class="s" d="M 229,50 L 249,50 C 251,34 229,30 229,50 C 229,66 243,70 251,62"/>
  <!-- i stem -->
  <path class="s" d="M 259,36 L 259,65"/>
  <!-- i dot -->
  <path class="dot" d="M 259,24 L 259,25"/>
  <!-- n stroke1: stem -->
  <path class="s" d="M 267,36 L 267,65"/>
  <!-- n stroke2: arch -->
  <path class="s" d="M 267,42 C 273,32 285,32 291,42 L 291,65"/>

  <!-- ===== Marketing ===== word pause -->
  <!-- M -->
  <path class="s wp" d="M 326,65 L 330,18 L 346,50 L 362,18 L 366,65"/>
  <!-- a -->
  <path class="s" d="M 393,38 C 393,28 371,28 371,50 C 371,66 393,66 393,48 L 393,65"/>
  <!-- r stroke1: stem -->
  <path class="s" d="M 400,36 L 400,65"/>
  <!-- r stroke2: hook -->
  <path class="s" d="M 400,44 C 404,34 414,34 416,40"/>
  <!-- k stroke1: stem -->
  <path class="s" d="M 421,18 L 421,65"/>
  <!-- k stroke2: diagonals -->
  <path class="s" d="M 443,36 L 421,52 L 443,65"/>
  <!-- e -->
  <path class="s" d="M 448,50 L 468,50 C 470,34 448,30 448,50 C 448,66 462,70 470,62"/>
  <!-- t stroke1: stem -->
  <path class="s" d="M 483,22 L 483,65"/>
  <!-- t stroke2: cross -->
  <path class="s" d="M 475,36 L 491,36"/>
  <!-- i stem -->
  <path class="s" d="M 499,36 L 499,65"/>
  <!-- i dot -->
  <path class="dot" d="M 499,24 L 499,25"/>
  <!-- n stroke1: stem -->
  <path class="s" d="M 507,36 L 507,65"/>
  <!-- n stroke2: arch -->
  <path class="s" d="M 507,42 C 513,32 525,32 531,42 L 531,65"/>
  <!-- g stroke1: bowl -->
  <path class="s" d="M 558,40 C 558,28 536,28 536,50 C 536,66 558,66 558,48"/>
  <!-- g stroke2: descender -->
  <path class="s" d="M 558,36 L 558,82 C 558,88 540,86 536,80"/>

  <!-- ===== mit ===== word pause -->
  <!-- m stroke1: stem -->
  <path class="s wp" d="M 595,36 L 595,65"/>
  <!-- m stroke2: arch1 -->
  <path class="s" d="M 595,42 C 600,32 609,32 614,42 L 614,65"/>
  <!-- m stroke3: arch2 -->
  <path class="s" d="M 614,42 C 619,32 628,32 633,42 L 633,65"/>
  <!-- i stem -->
  <path class="s" d="M 641,36 L 641,65"/>
  <!-- i dot -->
  <path class="dot" d="M 641,24 L 641,25"/>
  <!-- t stroke1: stem -->
  <path class="s" d="M 657,22 L 657,65"/>
  <!-- t stroke2: cross -->
  <path class="s" d="M 649,36 L 665,36"/>

  <!-- ===== AI ===== word pause -->
  <!-- A stroke1: legs -->
  <path class="s wp" d="M 700,65 L 718,18 L 736,65"/>
  <!-- A stroke2: crossbar -->
  <path class="s" d="M 708,46 L 728,46"/>
  <!-- I -->
  <path class="s" d="M 744,18 L 744,65"/>

  <!-- Pen cursor -->
  <circle id="pen" r="4"/>
</svg>

<script>
(()=>{
  const paths=[...document.querySelectorAll('.s,.dot')];
  const pen=document.getElementById('pen');
  const SPEED=280; // px per second — leisurely handwriting
  const STROKE_GAP=40; // ms between strokes of same letter
  const WORD_GAP=220; // ms pause between words

  // Measure all paths, keep fully hidden
  paths.forEach(p=>{
    const len=p.getTotalLength();
    p._len=len;
    p.style.strokeDasharray=len;
    p.style.strokeDashoffset=len;
  });

  // Schedule each path individually via setTimeout
  let t=300;
  const schedule=[];

  paths.forEach(p=>{
    const len=p._len;
    const dur=Math.max(80,(len/SPEED)*1000);
    if(p.classList.contains('wp')) t+=WORD_GAP;

    schedule.push({el:p,start:t,dur:dur,len:len});

    // Reveal + animate at the right moment
    const startT=t, durT=dur;
    setTimeout(()=>{
      p.style.opacity='1';
      p.style.transition=`stroke-dashoffset ${durT}ms cubic-bezier(.4,0,.2,1)`;
      // Force layout before changing offset
      p.getBoundingClientRect();
      p.style.strokeDashoffset='0';
    },startT);

    t+=dur+STROKE_GAP;
  });

  const totalEnd=t;

  // Pen cursor follows the drawing tip
  const t0=performance.now()+300;

  function movePen(now){
    const elapsed=now-t0;
    if(elapsed>totalEnd){
      pen.style.transition='opacity 0.4s';
      pen.style.opacity='0';
      return;
    }

    for(let i=schedule.length-1;i>=0;i--){
      const s=schedule[i];
      if(elapsed>=s.start && elapsed<=s.start+s.dur){
        const progress=Math.min(1,(elapsed-s.start)/s.dur);
        const pt=s.el.getPointAtLength(progress*s.len);
        pen.setAttribute('cx',pt.x);
        pen.setAttribute('cy',pt.y);
        pen.style.opacity='0.6';
        break;
      }else if(elapsed>s.start+s.dur){
        const pt=s.el.getPointAtLength(s.len);
        pen.setAttribute('cx',pt.x);
        pen.setAttribute('cy',pt.y);
        if(i<schedule.length-1 && elapsed<schedule[i+1].start){
          pen.style.opacity='0.4';
        }
        break;
      }
    }
    requestAnimationFrame(movePen);
  }
  requestAnimationFrame(movePen);
})();
</script>

</body>
</html>
