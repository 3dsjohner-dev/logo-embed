<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:transparent;display:flex;align-items:center;justify-content:center}
  svg{width:90vw;max-width:950px;height:auto}
  .s{fill:none;stroke:#1a1a1a;stroke-width:7.5;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .dot{fill:none;stroke:#1a1a1a;stroke-width:9;stroke-linecap:round;opacity:0}
  #pen{display:none}
</style>
</head>
<body>

<svg viewBox="0 0 762 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="wobble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#wobble)">

  <!-- ===== Mache ===== -->
  <!-- M -->
  <path class="s" d="M 15,66 L 18,19 L 35,51 L 52,17 L 55,64"/>
  <!-- a -->
  <path class="s" d="M 82,39 C 83,27 59,29 60,51 C 59,67 83,65 82,47 L 83,66"/>
  <!-- c -->
  <path class="s" d="M 110,37 C 102,27 88,35 89,51 C 88,65 100,71 110,63"/>
  <!-- h stroke1: stem -->
  <path class="s" d="M 115,17 L 114,66"/>
  <!-- h stroke2: arch -->
  <path class="s" d="M 114,43 C 121,33 131,35 139,43 L 138,66"/>
  <!-- e -->
  <path class="s" d="M 144,51 L 164,49 C 166,33 142,31 143,51 C 144,67 158,71 166,61"/>

  <!-- ===== dein ===== word pause -->
  <!-- d stroke1: bowl -->
  <path class="s wp" d="M 223,43 C 219,29 199,31 200,51 C 199,67 217,69 223,53"/>
  <!-- d stroke2: stem -->
  <path class="s" d="M 223,17 L 222,66"/>
  <!-- e -->
  <path class="s" d="M 230,51 L 250,49 C 252,33 228,31 229,51 C 230,67 244,71 252,61"/>
  <!-- i stem -->
  <path class="s" d="M 260,37 L 259,66"/>
  <!-- i dot -->
  <path class="dot" d="M 259,23 L 260,25"/>
  <!-- n stroke1: stem -->
  <path class="s" d="M 268,37 L 267,66"/>
  <!-- n stroke2: arch -->
  <path class="s" d="M 267,43 C 274,31 286,33 292,43 L 291,66"/>

  <!-- ===== Marketing ===== word pause -->
  <!-- M -->
  <path class="s wp" d="M 326,66 L 329,19 L 347,51 L 363,17 L 367,64"/>
  <!-- a -->
  <path class="s" d="M 394,39 C 394,27 370,29 371,51 C 370,67 394,65 393,47 L 394,66"/>
  <!-- r stroke1: stem -->
  <path class="s" d="M 401,37 L 400,66"/>
  <!-- r stroke2: hook -->
  <path class="s" d="M 400,45 C 405,33 415,35 417,41"/>
  <!-- k stroke1: stem -->
  <path class="s" d="M 422,17 L 421,66"/>
  <!-- k stroke2: diagonals -->
  <path class="s" d="M 444,37 L 421,53 L 444,64"/>
  <!-- e -->
  <path class="s" d="M 449,51 L 469,49 C 471,33 447,31 448,51 C 449,67 463,71 471,61"/>
  <!-- t stroke1: stem -->
  <path class="s" d="M 484,21 L 483,66"/>
  <!-- t stroke2: cross -->
  <path class="s" d="M 474,37 L 492,35"/>
  <!-- i stem -->
  <path class="s" d="M 500,37 L 499,66"/>
  <!-- i dot -->
  <path class="dot" d="M 499,23 L 500,25"/>
  <!-- n stroke1: stem -->
  <path class="s" d="M 508,37 L 507,66"/>
  <!-- n stroke2: arch -->
  <path class="s" d="M 507,43 C 514,31 526,33 532,43 L 531,66"/>
  <!-- g stroke1: bowl -->
  <path class="s" d="M 559,41 C 559,27 535,29 536,51 C 535,67 559,65 558,47"/>
  <!-- g stroke2: descender -->
  <path class="s" d="M 559,37 L 558,83 C 559,89 539,87 536,81"/>

  <!-- ===== mit ===== word pause -->
  <!-- m stroke1: stem -->
  <path class="s wp" d="M 596,37 L 595,66"/>
  <!-- m stroke2: arch1 -->
  <path class="s" d="M 595,43 C 601,31 610,33 615,43 L 614,66"/>
  <!-- m stroke3: arch2 -->
  <path class="s" d="M 614,43 C 620,31 629,33 634,43 L 633,66"/>
  <!-- i stem -->
  <path class="s" d="M 642,37 L 641,66"/>
  <!-- i dot -->
  <path class="dot" d="M 641,23 L 642,25"/>
  <!-- t stroke1: stem -->
  <path class="s" d="M 658,21 L 657,66"/>
  <!-- t stroke2: cross -->
  <path class="s" d="M 648,37 L 666,35"/>

  <!-- ===== AI ===== word pause -->
  <!-- A stroke1: legs -->
  <path class="s wp" d="M 700,66 L 719,17 L 737,64"/>
  <!-- A stroke2: crossbar -->
  <path class="s" d="M 709,47 L 729,45"/>
  <!-- I -->
  <path class="s" d="M 745,17 L 744,66"/>

  </g><!-- close wobble filter group -->

  <!-- Pen cursor -->
  <circle id="pen" r="4"/>
</svg>

<script>
(()=>{
  const paths=[...document.querySelectorAll('.s,.dot')];
  const pen=document.getElementById('pen');
  const SPEED=280; // px per second — leisurely handwriting
  const STROKE_GAP=40; // ms between strokes of same letter
  const WORD_GAP=220; // ms pause between words

  // Measure all paths, keep fully hidden
  paths.forEach(p=>{
    const len=p.getTotalLength();
    p._len=len;
    p.style.strokeDasharray=len;
    p.style.strokeDashoffset=len;
  });

  // Schedule each path individually via setTimeout
  let t=300;
  const schedule=[];

  paths.forEach(p=>{
    const len=p._len;
    const dur=Math.max(80,(len/SPEED)*1000);
    if(p.classList.contains('wp')) t+=WORD_GAP;

    schedule.push({el:p,start:t,dur:dur,len:len});

    // Reveal + animate at the right moment
    const startT=t, durT=dur;
    setTimeout(()=>{
      p.style.opacity='1';
      p.style.transition=`stroke-dashoffset ${durT}ms cubic-bezier(.4,0,.2,1)`;
      // Force layout before changing offset
      p.getBoundingClientRect();
      p.style.strokeDashoffset='0';
    },startT);

    t+=dur+STROKE_GAP;
  });

  const totalEnd=t;

  // Pen cursor follows the drawing tip
  const t0=performance.now()+300;

  function movePen(now){
    const elapsed=now-t0;
    if(elapsed>totalEnd){
      pen.style.transition='opacity 0.4s';
      pen.style.opacity='0';
      return;
    }

    for(let i=schedule.length-1;i>=0;i--){
      const s=schedule[i];
      if(elapsed>=s.start && elapsed<=s.start+s.dur){
        const progress=Math.min(1,(elapsed-s.start)/s.dur);
        const pt=s.el.getPointAtLength(progress*s.len);
        pen.setAttribute('cx',pt.x);
        pen.setAttribute('cy',pt.y);
        pen.style.opacity='0.6';
        break;
      }else if(elapsed>s.start+s.dur){
        const pt=s.el.getPointAtLength(s.len);
        pen.setAttribute('cx',pt.x);
        pen.setAttribute('cy',pt.y);
        if(i<schedule.length-1 && elapsed<schedule[i+1].start){
          pen.style.opacity='0.4';
        }
        break;
      }
    }
    requestAnimationFrame(movePen);
  }
  requestAnimationFrame(movePen);
})();
</script>

</body>
</html>
