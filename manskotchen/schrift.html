<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:transparent;display:flex;align-items:center;justify-content:center;overflow:visible}
  svg{width:90vw;height:auto}
</style>
</head>
<body>

<svg id="hw" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="1000" height="120">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
    .word{
      font-family:'Permanent Marker',cursive;
      font-size:62px;
      fill:none;
      stroke:#000;
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .word-fill{
      font-family:'Permanent Marker',cursive;
      font-size:62px;
      fill:#000;
      opacity:0;
    }
  </style>
  <!-- Stroke layer (gets drawn) -->
  <text class="word" id="t1" x="10" y="78">Mache</text>
  <text class="word" id="t2" x="265" y="78">dein</text>
  <text class="word" id="t3" x="430" y="78">Marketing</text>
  <text class="word" id="t4" x="780" y="78">mit</text>
  <text class="word" id="t5" x="880" y="78">AI</text>
  <!-- Fill layer (fades in after stroke) -->
  <text class="word-fill" id="f1" x="10" y="78">Mache</text>
  <text class="word-fill" id="f2" x="265" y="78">dein</text>
  <text class="word-fill" id="f3" x="430" y="78">Marketing</text>
  <text class="word-fill" id="f4" x="780" y="78">mit</text>
  <text class="word-fill" id="f5" x="880" y="78">AI</text>
  <!-- Pen dot -->
  <circle id="pen" r="5" fill="#000" opacity="0"/>
  <!-- Underline under AI -->
  <line id="underline" x1="878" y1="92" x2="960" y2="92" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-dasharray="82" stroke-dashoffset="82"/>
</svg>

<script>
document.fonts.ready.then(()=>{
  const words=[
    {stroke:'t1',fill:'f1',dur:0.6, delay:0.15},
    {stroke:'t2',fill:'f2',dur:0.45,delay:0.12},
    {stroke:'t3',fill:'f3',dur:0.9, delay:0.1},
    {stroke:'t4',fill:'f4',dur:0.35,delay:0.12},
    {stroke:'t5',fill:'f5',dur:0.5, delay:0.1},
  ];

  // Measure & set up stroke-dasharray for each word
  words.forEach(w=>{
    const el=document.getElementById(w.stroke);
    const len=el.getComputedTextLength()*3.2; // multiplier for stroke detail
    el.style.strokeDasharray=len;
    el.style.strokeDashoffset=len;
    w.len=len;
    w.el=el;
    w.fillEl=document.getElementById(w.fill);
  });

  const pen=document.getElementById('pen');
  const underline=document.getElementById('underline');
  let time=0;

  // Animate each word sequentially
  words.forEach((w,i)=>{
    const start=time;
    // Stroke draw animation
    w.el.style.transition=`stroke-dashoffset ${w.dur}s cubic-bezier(.45,.05,.55,.95) ${start}s`;
    // Fill fade-in after stroke completes
    w.fillEl.style.transition=`opacity 0.25s ease ${start+w.dur*0.7}s`;

    setTimeout(()=>{
      w.el.style.strokeDashoffset='0';
      w.fillEl.style.opacity='1';
    },50);

    // Move pen dot along the text during writing
    const bbox=w.el.getBBox();
    const penStart=start*1000;
    const penDur=w.dur*1000;
    animatePen(pen, bbox, penStart, penDur);

    time+=w.dur+w.delay;
  });

  // Underline after AI
  const ulStart=time-0.05;
  underline.style.transition=`stroke-dashoffset 0.25s ease ${ulStart}s`;
  setTimeout(()=>underline.style.strokeDashoffset='0',50);

  // Fade out pen after done
  const totalEnd=(time+0.3)*1000;
  setTimeout(()=>{pen.style.transition='opacity 0.3s';pen.style.opacity='0'},totalEnd);

  function animatePen(dot, bbox, startMs, durMs){
    const x0=bbox.x;
    const x1=bbox.x+bbox.width;
    const y=bbox.y+bbox.height*0.5;
    const frames=Math.ceil(durMs/16);
    let frame=0;
    const t0=performance.now()+startMs+50;

    function tick(now){
      if(now<t0){requestAnimationFrame(tick);return}
      const elapsed=now-t0;
      const p=Math.min(elapsed/durMs,1);
      // Eased progress
      const ep=p<0.5?2*p*p:(1-Math.pow(-2*p+2,2)/2);
      const cx=x0+(x1-x0)*ep;
      // Slight vertical wobble for hand feel
      const wobble=Math.sin(p*Math.PI*6)*1.5;
      dot.setAttribute('cx',cx);
      dot.setAttribute('cy',y+wobble);
      dot.style.opacity='1';
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
});
</script>

</body>
</html>
