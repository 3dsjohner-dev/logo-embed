<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Manskotchen</title>
<style>
  html,body{margin:0;height:100%;background:transparent;display:flex;align-items:center;justify-content:center;overflow:visible}
  .stage{width:min(80vmin,560px);aspect-ratio:1/1;position:relative}

  /* Original-Logo (Stern) - bleibt komplett unverändert */
  .logo{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}

  /* Animations-Layer (Arme/Beine/Augen) - liegt UNTER dem Logo,
     Original ist im PNG schon entfernt, also keine Doppel-Sichtbarkeit */
  .anim{position:absolute;inset:0;width:100%;height:100%;z-index:1;overflow:visible}

  /* ----- ARME ----- */
  /* armL bbox: 36-139, 294-339  -> Schulteransatz rechts (ca. 139,317) */
  .armL{transform-origin:139px 317px;animation:armL 6s ease-in-out infinite}
  /* armR bbox: 463-560, 300-343 -> Schulteransatz links (ca. 463,322) */
  .armR{transform-origin:463px 322px;animation:armR 6s ease-in-out infinite}
  @keyframes armL{
    0%,100%{transform:rotate(0deg)}
    25%    {transform:rotate(-12deg)}
    50%    {transform:rotate( 6deg)}
    75%    {transform:rotate(-6deg)}
  }
  @keyframes armR{
    0%,100%{transform:rotate(0deg)}
    25%    {transform:rotate(14deg)}
    50%    {transform:rotate(-8deg)}
    75%    {transform:rotate(8deg)}
  }

  /* ----- BEINE ----- */
  /* legL bbox: 187-232, 411-536  -> Hüfte oben (210,411) */
  .legL{transform-origin:210px 411px;animation:legL 6s ease-in-out infinite}
  /* legR bbox: 364-411, 458-537  -> Hüfte oben (388,458) */
  .legR{transform-origin:388px 458px;animation:legR 6s ease-in-out infinite}
  @keyframes legL{0%,100%{transform:rotate(0)}33%{transform:rotate(-6deg)}66%{transform:rotate(4deg)}}
  @keyframes legR{0%,100%{transform:rotate(0)}33%{transform:rotate(6deg)}66%{transform:rotate(-4deg)}}

  /* ----- AUGEN ----- */
  /* eyeL bbox: 198-292, 185-277  -> center (245, 231), r ~46 */
  /* eyeR bbox: 308-403, 185-277  -> center (355, 231), r ~46 */
  .pupilL,.pupilR{animation:look 7s ease-in-out infinite}
  @keyframes look{
    0%,15%   {transform:translate(0,0)}
    25%,38%  {transform:translate(7px,-3px)}
    48%,62%  {transform:translate(-7px,2px)}
    72%,85%  {transform:translate(0,-3px)}
    100%     {transform:translate(0,0)}
  }
  .lid{transform-origin:center;transform:scaleY(0);animation:blink 5s ease-in-out infinite}
  @keyframes blink{
    0%,92%,100%{transform:scaleY(0)}
    94%,96%    {transform:scaleY(1)}
  }
</style>
</head>
<body>
<div class="stage">

  <!-- Animations-Ebene unter dem Logo -->
  <svg class="anim" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <!-- Linker Arm (in Originalposition: kurze Kurve nach links außen) -->
    <g class="armL">
      <path d="M139 317 C 100 322, 70 326, 38 318" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round" fill="none"/>
    </g>
    <!-- Rechter Arm -->
    <g class="armR">
      <path d="M463 322 C 500 326, 530 330, 562 320" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Linkes Bein -->
    <g class="legL">
      <line x1="210" y1="411" x2="200" y2="520" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
      <ellipse cx="198" cy="528" rx="20" ry="9" fill="#1a1a1a"/>
    </g>
    <!-- Rechtes Bein -->
    <g class="legR">
      <line x1="388" y1="458" x2="395" y2="525" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
      <ellipse cx="397" cy="532" rx="20" ry="9" fill="#1a1a1a"/>
    </g>

    <!-- Augen -->
    <g>
      <circle cx="245" cy="231" r="46" fill="#1a1a1a"/>
      <circle cx="355" cy="231" r="46" fill="#1a1a1a"/>
      <g class="pupilL">
        <circle cx="252" cy="238" r="20" fill="#fff"/>
        <circle cx="255" cy="240" r="9"  fill="#000"/>
        <circle cx="248" cy="232" r="3"  fill="#fff"/>
      </g>
      <g class="pupilR">
        <circle cx="362" cy="238" r="20" fill="#fff"/>
        <circle cx="365" cy="240" r="9"  fill="#000"/>
        <circle cx="358" cy="232" r="3"  fill="#fff"/>
      </g>
      <ellipse class="lid" cx="245" cy="231" rx="48" ry="48" fill="#000"/>
      <ellipse class="lid" cx="355" cy="231" rx="48" ry="48" fill="#000"/>
    </g>
  </svg>
