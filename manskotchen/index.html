<style>

.stage{width:min(90vmin,640px);aspect-ratio:1/1;position:relative}
.walker{width:100%;height:100%;transform-origin:center;animation:walk 9s ease-in-out infinite}
.bob{width:100%;height:100%;animation:bob .55s ease-in-out infinite}
.sway{width:100%;height:100%;animation:sway 1.6s ease-in-out infinite;transform-origin:50% 70%}
img{width:100%;height:100%;display:block;image-rendering:auto;animation:squish .55s ease-in-out infinite;transform-origin:50% 95%}
@keyframes walk{
 0%{transform:translateX(-22%) scaleX(1)}
 45%{transform:translateX(22%) scaleX(1)}
 50%{transform:translateX(22%) scaleX(-1)}
 95%{transform:translateX(-22%) scaleX(-1)}
 100%{transform:translateX(-22%) scaleX(1)}
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes squish{0%,100%{transform:scale(1,1)}50%{transform:scale(1.03,.97)}}
</style></head>
