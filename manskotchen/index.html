<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Manskotchen</title>
<style>
  html,body{margin:0;height:100%;background:transparent;display:flex;align-items:center;justify-content:center;overflow:visible}
  .stage{width:min(80vmin,560px);aspect-ratio:1/1;position:relative}
  svg{width:100%;height:100%;display:block;overflow:visible}

  /* Stern-Körper bleibt komplett still – nur sanftes Atmen */
  .body{transform-origin:512px 700px;animation:breathe 4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.015,.985)}}

  /* ----- ARME (sanftes Winken / Auf-und-Ab) ----- */
  .armL{transform-origin:300px 540px;animation:armL 6s ease-in-out infinite}
  .armR{transform-origin:724px 540px;animation:armR 6s ease-in-out infinite}
  @keyframes armL{
    0%,100% {transform:rotate(0deg)}
    25%     {transform:rotate(-12deg)}
    50%     {transform:rotate(6deg)}
    75%     {transform:rotate(-6deg)}
  }
  @keyframes armR{
    0%,100% {transform:rotate(0deg)}
    25%     {transform:rotate(14deg)}
    50%     {transform:rotate(-8deg)}
    75%     {transform:rotate(8deg)}
  }

  /* ----- BEINE (minimaler Trippler) ----- */
  .legL{transform-origin:430px 800px;animation:legL 6s ease-in-out infinite}
  .legR{transform-origin:600px 800px;animation:legR 6s ease-in-out infinite}
  @keyframes legL{0%,100%{transform:rotate(0)}33%{transform:rotate(-6deg)}66%{transform:rotate(4deg)}}
  @keyframes legR{0%,100%{transform:rotate(0)}33%{transform:rotate(6deg)}66%{transform:rotate(-4deg)}}

  /* ----- AUGEN (langsam umherschauen, gelegentlich blinzeln) ----- */
  .pupilL,.pupilR{animation:look 7s ease-in-out infinite}
  @keyframes look{
    0%,15%   {transform:translate(0,0)}
    25%,38%  {transform:translate(8px,-3px)}
    48%,62%  {transform:translate(-8px,2px)}
    72%,85%  {transform:translate(0,-4px)}
    100%     {transform:translate(0,0)}
  }
  .lid{transform-origin:center;transform:scaleY(0);animation:blink 5s ease-in-out infinite}
  @keyframes blink{
    0%,92%,100%{transform:scaleY(0)}
    94%,96%    {transform:scaleY(1)}
  }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <g class="body">

    <!-- Arme (hinter Stern) -->
    <g class="armL">
      <path d="M300 540 C 230 560, 170 580, 110 565"
            stroke="#1a1a1a" stroke-width="18" stroke-linecap="round" fill="none"/>
      <circle cx="108" cy="568" r="14" fill="#1a1a1a"/>
    </g>
    <g class="armR">
      <path d="M724 540 C 800 560, 860 580, 915 565"
            stroke="#1a1a1a" stroke-width="18" stroke-linecap="round" fill="none"/>
      <circle cx="917" cy="568" r="14" fill="#1a1a1a"/>
    </g>

    <!-- Beine (hinter Stern) -->
    <g class="legL">
      <line x1="430" y1="800" x2="410" y2="915"
            stroke="#1a1a1a" stroke-width="16" stroke-linecap="round"/>
      <ellipse cx="405" cy="928" rx="26" ry="12" fill="#1a1a1a"/>
    </g>
    <g class="legR">
      <line x1="600" y1="800" x2="620" y2="915"
            stroke="#1a1a1a" stroke-width="16" stroke-linecap="round"/>
      <ellipse cx="625" cy="928" rx="26" ry="12" fill="#1a1a1a"/>
    </g>

    <!-- Stern-Körper (statisch, original-treu) -->
    <path d="
      M 512 140
      C 560 260, 640 300, 820 250
      C 770 360, 800 460, 870 560
      C 740 560, 660 640, 640 820
      C 560 740, 460 760, 360 860
      C 380 720, 320 620, 170 600
      C 300 540, 340 440, 300 290
      C 410 340, 470 300, 512 140 Z"
      fill="none" stroke="#ff7a1a" stroke-width="34"
      stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Augen (statische Position, animierte Pupillen + Lider) -->
    <g>
      <circle cx="445" cy="470" r="55" fill="#1a1a1a"/>
      <circle cx="575" cy="475" r="50" fill="#1a1a1a"/>
      <g class="pupilL">
        <circle cx="455" cy="480" r="22" fill="#fff"/>
        <circle cx="458" cy="482" r="10" fill="#000"/>
        <circle cx="450" cy="473" r="4" fill="#fff"/>
      </g>
      <g class="pupilR">
        <circle cx="585" cy="485" r="20" fill="#fff"/>
        <circle cx="588" cy="487" r="9" fill="#000"/>
        <circle cx="580" cy="478" r="4" fill="#fff"/>
      </g>
      <ellipse class="lid" cx="445" cy="470" rx="58" ry="58" fill="#000"/>
      <ellipse class="lid" cx="575" cy="475" rx="53" ry="53" fill="#000"/>
    </g>

  </g>
</svg>
</div>
</body>
</html>
