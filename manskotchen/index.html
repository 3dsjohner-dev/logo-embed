<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Manskotchen</title>
<style>
  html,body{margin:0;height:100%;background:transparent;display:flex;align-items:center;justify-content:center;overflow:visible}
  .stage{width:min(80vmin,560px);aspect-ratio:1/1;position:relative}
  svg{width:100%;height:100%;display:block;overflow:visible}

  .walker{transform-origin:750px 750px;animation:walk 10s ease-in-out infinite}
  @keyframes walk{
    0%  {transform:translateX(-15%) scaleX(1)  rotate(-3deg)}
    45% {transform:translateX( 15%) scaleX(1)  rotate( 3deg)}
    50% {transform:translateX( 15%) scaleX(-1) rotate(-3deg)}
    95% {transform:translateX(-15%) scaleX(-1) rotate( 3deg)}
    100%{transform:translateX(-15%) scaleX(1)  rotate(-3deg)}
  }
  .hop{transform-origin:750px 750px;animation:hop .9s cubic-bezier(.5,0,.5,1) infinite}
  @keyframes hop{
    0%,100%{transform:translateY(0)}
    40%    {transform:translateY(-50px)}
    80%    {transform:translateY(0)}
    90%    {transform:translateY(-4px)}
  }
  .sway{transform-origin:750px 700px;animation:sway 1.6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .body{transform-origin:750px 800px;animation:squish .9s ease-in-out infinite}
  @keyframes squish{
    0%,100%{transform:scale(1,1)}
    40%    {transform:scale(.96,1.04)}
    80%    {transform:scale(1.06,.94)}
  }
  .armL{transform-origin:430px 720px;animation:armL .9s ease-in-out infinite}
  .armR{transform-origin:1070px 720px;animation:armR .9s ease-in-out infinite}
  @keyframes armL{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(35deg)}}
  @keyframes armR{0%,100%{transform:rotate(25deg)}50%{transform:rotate(-35deg)}}
  .legL{transform-origin:600px 1010px;animation:legL .9s ease-in-out infinite}
  .legR{transform-origin:870px 1010px;animation:legR .9s ease-in-out infinite}
  @keyframes legL{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-20deg)}}
  @keyframes legR{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
  .pupilL,.pupilR{animation:look 3.2s ease-in-out infinite}
  @keyframes look{
    0%,18%  {transform:translate(0,0)}
    28%,44% {transform:translate(14px,-6px)}
    54%,70% {transform:translate(-14px,3px)}
    80%,100%{transform:translate(0,0)}
  }
  .lid{transform-origin:center;transform:scaleY(0);animation:blink 5s ease-in-out infinite}
  @keyframes blink{
    0%,93%,100%{transform:scaleY(0)}
    96%,98%    {transform:scaleY(1)}
  }
</style>
</head>
<body>
<div class="stage">
<svg viewBox="0 0 1500 1500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g class="walker"><g class="hop"><g class="sway"><g class="body" filter="url(#glow)">
    <g class="armL">
      <path d="M430 720 C 340 740, 260 760, 190 745" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" fill="none"/>
      <circle cx="186" cy="748" r="18" fill="#1a1a1a"/>
    </g>
    <g class="armR">
      <path d="M1070 720 C 1160 740, 1240 760, 1310 745" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round" fill="none"/>
      <circle cx="1314" cy="748" r="18" fill="#1a1a1a"/>
    </g>
    <g class="legL">
      <line x1="600" y1="1010" x2="575" y2="1170" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
      <ellipse cx="568" cy="1185" rx="34" ry="14" fill="#1a1a1a"/>
    </g>
    <g class="legR">
      <line x1="870" y1="1010" x2="895" y2="1170" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round"/>
      <ellipse cx="902" cy="1185" rx="34" ry="14" fill="#1a1a1a"/>
    </g>
    <path d="M 750 320 C 810 470, 910 520, 1130 460 C 1070 590, 1110 710, 1190 830 C 1030 830, 930 925, 905 1140 C 810 1045, 690 1070, 570 1185 C 595 1015, 520 895, 340 870 C 495 800, 545 680, 495 500 C 625 555, 695 510, 750 320 Z"
      fill="none" stroke="#ff7a1a" stroke-width="42" stroke-linejoin="round" stroke-linecap="round"/>
    <g>
      <circle cx="660" cy="700" r="78" fill="#1a1a1a"/>
      <circle cx="850" cy="705" r="72" fill="#1a1a1a"/>
      <g class="pupilL">
        <circle cx="672" cy="710" r="34" fill="#fff"/>
        <circle cx="676" cy="713" r="16" fill="#000"/>
        <circle cx="666" cy="700" r="6" fill="#fff"/>
      </g>
      <g class="pupilR">
        <circle cx="862" cy="715" r="32" fill="#fff"/>
        <circle cx="866" cy="718" r="15" fill="#000"/>
        <circle cx="857" cy="705" r="6" fill="#fff"/>
      </g>
      <ellipse class="lid" cx="660" cy="700" rx="82" ry="82" fill="#000"/>
      <ellipse class="lid" cx="850" cy="705" rx="76" ry="76" fill="#000"/>
    </g>
  </g></g></g></g>
</svg>
</div>
</body>
</html>
